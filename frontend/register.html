<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CuanKLIK - Register</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="outer">
      <div class="phone"></div>
      <div class="register-card"></div>
      <div class="register-title">Daftar</div>
      <div class="register-description">
        Buat akun untuk mengakses kalkulasi Harga Pokok Penjualan disini!
      </div>
      <div class="register-signup">
        <span>Sudah ada akun?</span
        ><a href="login.html" class="link-text"> masuk disini</a>
      </div>
      <div class="register-button-container">
        <div class="register-button-bg"></div>
        <div class="register-button-text">Daftar</div>
      </div>
      <div class="register-input-1">
        <input
          class="register-input-field"
          type="text"
          placeholder="Username"
        />
      </div>
      <div class="register-input-2">
        <input
          class="register-input-field"
          type="text"
          placeholder="Nama UMKM"
        />
      </div>
      <div class="register-input-3">
        <input class="register-input-field" type="email" placeholder="Email" />
      </div>
      <div class="register-input-4">
        <input
          class="register-input-field"
          type="tel"
          placeholder="No Telepon"
        />
      </div>
      <div class="register-input-5">
        <input
          class="register-input-field"
          type="password"
          placeholder="Password"
        />
      </div>
      <div class="register-input-6">
        <input
          class="register-input-field"
          type="password"
          placeholder="Ulangi Password"
        />
      </div>
    </div>
  </body>
</html>
