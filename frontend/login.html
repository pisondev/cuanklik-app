<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CuanKLIK - Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="outer">
      <div class="phone"></div>
      <div class="card"></div>
      <div class="login-title">Masuk</div>
      <div class="login-description">
        Akses kalkulasi Harga Pokok Penjualan disini!
      </div>
      <div class="signup">
        <span>Belum ada akun?</span
        ><a href="register.html" class="link-text"> daftar disini</a>
      </div>
      <div class="button-container">
        <div class="button-bg"></div>
        <div class="button-text">Masuk</div>
      </div>
      <div class="input-container">
        <div style="align-self: stretch; height: 44px; position: relative">
          <div class="input-border"></div>
          <input class="input-field" type="text" placeholder="Username" />
        </div>
      </div>
      <div class="password-container">
        <div style="align-self: stretch; height: 44px; position: relative">
          <div class="password-border"></div>
          <input
            class="password-field"
            type="password"
            placeholder="Password"
          />
        </div>
      </div>
    </div>
  </body>
</html>
