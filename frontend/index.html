<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CuanKlik - Dashboard</title>
    <script src="/webui.js"></script> 
</head>
<body>
    <h2>Kalkulator Profit UMKM</h2>
    
    <div id="calcForm">
        <label>Nama Produk:</label><br>
        <input type="text" id="item_name" value="Produk A" required><br><br>

        <label>Biaya Tetap (Rp):</label><br>
        <input type="number" id="fixed_cost" value="500000" required><br><br>

        <label>Biaya Variabel / HPP (Rp):</label><br>
        <input type="number" id="variable_cost" value="8000" required><br><br>

        <label>Target Margin (%):</label><br>
        <input type="number" id="margin" value="30" required><br><br>

        <button type="button" onclick="hitungProfit()">Analisis Profit</button>
    </div>

    <div id="area-hasil" style="margin-top: 20px; padding: 10px; border: 1px solid black; display: none;">
        <h3>Hasil Analisis:</h3>
        <p id="hasil-teks"></p>
    </div>

    <script src="js/calculator.js"></script>
</body>
</html>
