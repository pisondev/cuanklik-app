<div id="view-profil" class="screen">
    <div class="profile-container">
        
        <div class="profile-header">
            <button class="profile-back-btn" onclick="bukaHalaman('view-kalkulator')">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <h2 class="profile-title">PROFIL</h2>
        </div>

        <div class="profile-card">
            
            <div class="profile-avatar-section">
                <div class="profile-avatar">
                    <img src="./assets/profile-logo.png" alt="Profile Logo">
                </div>
            </div>

            <button class="profile-edit-btn" id="btn-edit-profil" onclick="toggleEditProfil()">
                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            </button>

            <form id="form-profil" onsubmit="simpanProfil(event)">
                
                <div class="profile-field-pill">
                    <div class="pill-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    </div>
                    <div class="pill-content">
                        <label class="profile-label">Username</label>
                        <input type="text" id="prof_username" class="profile-input" readonly disabled>
                    </div>
                </div>

                <div class="profile-field-pill">
                    <div class="pill-icon">
                        <svg viewBox="0 0 24 24"><path d="M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2h1v6h10v-6h4v6h2v-6h1zm-9 4H6v-4h6v4z"/></svg>
                    </div>
                    <div class="pill-content">
                        <label class="profile-label">Nama UMKM</label>
                        <input type="text" id="prof_umkm" class="profile-input" readonly required>
                    </div>
                </div>

                <div class="profile-field-pill">
                    <div class="pill-icon">
                        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                    </div>
                    <div class="pill-content">
                        <label class="profile-label">Email</label>
                        <input type="email" id="prof_email" class="profile-input" readonly required>
                    </div>
                </div>

                <div class="profile-field-pill">
                    <div class="pill-icon">
                        <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                    </div>
                    <div class="pill-content">
                        <label class="profile-label">No. Telepon</label>
                        <input type="text" id="prof_phone" class="profile-input" readonly required>
                    </div>
                </div>
                
                <button type="submit" id="btn-simpan-profil" class="profile-save-btn">Simpan Perubahan</button>
            </form>

            <div class="profile-logout-section">
                <button class="profile-logout-btn" onclick="aksiLogout()">Logout</button>
            </div>
            
        </div>
    </div>
</div>
