<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuanKlik Mobile</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css" /> 
    <script src="/webui.js"></script>

    <style>
        body { 
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; background-color: #ffffff; font-family: monospace; 
        }
        
        #iphone-simulator { 
            width: 375px; 
            height: 812px;
            max-height: 95vh;
            background-color: #f0f5ff;
            border: none; 
            position: relative; overflow: hidden; display: flex; flex-direction: column; 
        }

        .home, .outer {
            width: 100% !important;
            height: 100% !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            margin: 0 !important;
        }

        .screen { 
            display: none; 
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            overflow-x: hidden; 
            overflow-y: auto; 
            -ms-overflow-style: none; 
            scrollbar-width: none;  
        }
        
        .screen::-webkit-scrollbar {
            display: none;
        }

        .active-screen { 
            display: block; 
        }

        h1, h2, h3 { border-bottom: 1px solid #000; padding-bottom: 5px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 2px; font-weight: bold; }
        
        input { 
            width: 100%; box-sizing: border-box; padding: 8px; 
            border: 1px solid #000; border-radius: 0; 
            background: #fff;
        }

        .btn { 
            width: 100%; padding: 10px; border: 1px solid #000; 
            border-radius: 0; 
            background: #fff; cursor: pointer; font-weight: bold;
            margin-bottom: 5px;
        }
        .btn:hover { background: #eee; }

        .bottom-nav { 
            position: absolute; 
            bottom: 0; 
            width: 100%; 
            height: 70px; 
            background: #FFFFFF; 
            box-shadow: 0 -5px 20px rgba(174, 190, 223, 0.2); 
            border-top: none; 
            border-radius: 20px 20px 0 0; 
            display: none; 
            justify-content: space-around; 
            align-items: center; 
            z-index: 1000; 
            font-family: 'Open Sans', sans-serif;
            padding-bottom: 10px; 
        }

        .nav-item { 
            cursor: pointer; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: #AABBE0; 
            transition: all 0.2s ease;
        }

        .nav-item span {
            font-size: 10px; 
            font-weight: 700;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: currentColor; 
            transition: transform 0.2s;
        }

        .nav-item.active { 
            color: #7F5BFF; 
        }
        
        .nav-item.active svg {
            transform: translateY(-2px); 
        }
        .nav-item:hover {
            color: #8C52FF;
        }

        #view-home, #view-login, #view-register, #view-kalkulator {
            padding: 0 !important; 
            align-items: center; 
            justify-content: center;
        }
        
        #view-home.active-screen, #view-login.active-screen, #view-register.active-screen {
            display: flex !important; 
        }

        #view-kalkulator.active-screen, #view-riwayat.active-screen, #view-profil.active-screen {
            display: block !important; 
        }

        #modul-auth, #modul-calculator, #modul-history, #modul-profile {
            display: contents;
        }
    </style>
</head>
<body>
    <div id="iphone-simulator">
        <div id="modul-auth"></div>
        <div id="modul-calculator"></div>
        <div id="modul-history"></div>
        <div id="modul-profile"></div>

        <div class="bottom-nav" id="bottom-navbar">
            <div class="nav-item active" id="nav-kalkulator" onclick="bukaHalaman('view-kalkulator')">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 16H7v-2h10v2zm0-4H7v-2h10v2zm0-4H7V9h10v2zm0-4H7V5h10v2z"/></svg>
                <span>Kalkulasi</span>
            </div>
            
            <div class="nav-item" id="nav-riwayat" onclick="bukaHalaman('view-riwayat')">
                <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
                <span>Riwayat</span>
            </div>
            
            <div class="nav-item" id="nav-profil" onclick="bukaHalaman('view-profil')">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <span>Profil</span>
            </div>
        </div>
    </div>

    <script src="./js/calculator.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/history.js"></script>
    <script src="./js/profile.js"></script>

    <script>
        let isGuestMode = false;

        async function muatSemuaModul() {
            console.log("Mulai memuat modul HTML...");
            const modulList = [
                { id: 'modul-auth', file: 'auth.html' },
                { id: 'modul-calculator', file: 'calculator.html' }, 
                { id: 'modul-history', file: 'history.html' },       
                { id: 'modul-profile', file: 'profile.html' }        
            ];
            
            for (let modul of modulList) {
                try {
                    const response = await fetch(`/views/${modul.file}`);
                    
                    if (response.ok) {
                        const html = await response.text();
                        document.getElementById(modul.id).innerHTML = html;
                        console.log(`✅ Berhasil memuat: ${modul.file}`);
                    } else {
                        console.warn(`⚠️ File tidak ditemukan: ${modul.file} (Status: ${response.status})`);
                    }
                } catch (error) {
                    console.error(`❌ Gagal fetch ${modul.file}:`, error);
                }
            }
        }

        function bukaHalaman(screenId) {
            console.log(`Berpindah ke halaman: ${screenId}`);
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            const target = document.getElementById(screenId);
            if(target) {
                target.classList.add('active-screen');
            } else {
                console.error(`Elemen dengan ID ${screenId} tidak ditemukan di HTML!`);
            }

            const nav = document.getElementById('bottom-navbar');
            const isAuthView = ['view-home', 'view-login', 'view-register'].includes(screenId);
            
            nav.style.display = (isAuthView || isGuestMode) ? 'none' : 'flex';

            if (!isAuthView && !isGuestMode) {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                
                const navId = 'nav-' + screenId.split('-')[1]; 
                const activeNavItem = document.getElementById(navId);
                if (activeNavItem) activeNavItem.classList.add('active');
            }

            if (screenId === 'view-kalkulator') aturTombolKalkulator();
            if (screenId === 'view-riwayat' && !isGuestMode) muatRiwayat();
            if (screenId === 'view-profil' && !isGuestMode) muatDataProfilKeForm();
        }

        function masukSebagaiTamu() {
            isGuestMode = true;
            localStorage.removeItem('user_data');
            bukaHalaman('view-kalkulator');
        }

        function aturTombolKalkulator() {
            const userDataStr = localStorage.getItem('user_data');
            const isLogin = userDataStr !== null;
            
            const btnUser = document.getElementById('btn-group-user');
            const btnGuest = document.getElementById('btn-group-guest');
            const displayUsername = document.getElementById('display-username');
            const navText = document.getElementById('dash-nav-text');
            
            if(isLogin) {
                if(btnUser) { btnUser.style.display = 'flex'; }
                if(btnGuest) { btnGuest.style.display = 'none'; }
                if(navText) { navText.innerText = "Keluar"; }
                
                const userData = JSON.parse(userDataStr);
                if(displayUsername) { displayUsername.innerText = userData.umkm_name; }
                
                isGuestMode = false;
            } else {
                if(btnUser) { btnUser.style.display = 'none'; }
                if(btnGuest) { btnGuest.style.display = 'flex'; }
                if(navText) { navText.innerText = "Home"; }
                if(displayUsername) { displayUsername.innerText = "TAMU"; }
            }
        }

        function aksiLogout() {
            localStorage.removeItem("user_data");
            isGuestMode = false;
            bukaHalaman('view-home');
        }

        window.onload = async () => {
            await muatSemuaModul();
            bukaHalaman('view-home');
        };
    </script>
</body>
</html>
